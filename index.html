
<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGK Nordic — Lager Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --bg2: #13161b;
    --bg3: #1a1e25;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #00d4a1;
    --accent2: #0ea5e9;
    --gold: #f59e0b;
    --silver: #94a3b8;
    --bronze: #b45309;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; position: relative; z-index: 1; }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2.5rem; }
  .header-left {}
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 28px; color: var(--text); line-height: 1.1; }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .header-right { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  .dot.error { background: var(--danger); animation: none; }
  .dot.idle { background: var(--muted); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn { background: transparent; border: 1px solid var(--border2); color: var(--muted); font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #0d0f12; border-color: var(--accent); font-weight: 500; }
  .btn.primary:hover { background: #00bfa0; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 2rem; border: 1px solid var(--border); }
  .metric { background: var(--bg2); padding: 1.25rem 1.5rem; }
  .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; font-family: 'DM Mono', monospace; }
  .metric-value { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 700; color: var(--text); line-height: 1; }
  .metric-value.accent { color: var(--accent); }
  .metric-sub { font-size: 12px; color: var(--muted); margin-top: 6px; font-family: 'DM Mono', monospace; }

  /* Leaderboard */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }

  .leaderboard { display: flex; flex-direction: column; gap: 6px; }
  .lb-row { display: flex; align-items: center; gap: 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; transition: border-color 0.2s; position: relative; overflow: hidden; }
  .lb-row:hover { border-color: var(--border2); }
  .lb-row.top1 { border-color: rgba(245,158,11,0.3); }
  .lb-row.top2 { border-color: rgba(148,163,184,0.2); }
  .lb-row.top3 { border-color: rgba(180,83,9,0.2); }

  /* bar background */
  .lb-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; background: rgba(0,212,161,0.04); width: var(--pct, 0%); transition: width 1s ease; border-radius: 10px 0 0 10px; }

  .rank-num { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); width: 22px; text-align: center; flex-shrink: 0; }
  .rank-num.gold { color: var(--gold); }
  .rank-num.silver { color: var(--silver); }
  .rank-num.bronze { color: var(--bronze); }

  .avatar { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; font-family: 'DM Mono', monospace; }

  .info { flex: 1; min-width: 0; }
  .emp-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .emp-email { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }

  .stats { display: flex; gap: 24px; align-items: center; flex-shrink: 0; }
  .stat { text-align: right; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
  .stat-val.accent { color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; }

  /* Config panel */
  .config-panel { background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; display: none; }
  .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.08em; }
  .field input, .field textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 12px; border-radius: 6px;
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 90px; }
  .field-full { grid-column: 1 / -1; }
  .btn-row { display: flex; gap: 8px; margin-top: 4px; }

  .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fca5a5; margin-bottom: 1rem; display: none; font-family: 'DM Mono', monospace; }

  /* Footer */
  .footer { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .footer-text { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* Animations */
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .lb-row { animation: fadeUp 0.4s ease both; }

  /* Responsive */
  @media (max-width: 600px) {
    .config-grid { grid-template-columns: 1fr; }
    .stats { gap: 12px; }
    .stat-val { font-size: 15px; }
    .metrics { grid-template-columns: 1fr 1fr; }
    .title { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <div class="logo">AGK Nordic</div>
      <div class="title">Lager Dashboard</div>
      <div class="subtitle" id="dateLabel">–</div>
    </div>
    <div class="header-right">
      <div class="status"><span class="dot idle" id="statusDot"></span><span id="statusText">Klar</span></div>
      <button class="btn" onclick="loadData()">↺ Opdater</button>
      <button class="btn" onclick="toggleConfig()">⚙ Opsætning</button>
    </div>
  </div>

  <div class="config-panel" id="configPanel">
    <div class="config-grid">
      <div class="field"><label>Tenant ID</label><input id="tenantId" placeholder="be863a6f-4fcf-45ad-a022-d0fb9f2c2507"></div>
      <div class="field"><label>Client ID</label><input id="clientId" placeholder="f2a15bed-6cc6-4bc7-a73e-3de3c070cbf8"></div>
      <div class="field"><label>Client Secret</label><input id="clientSecret" type="password" placeholder="Din secret værdi"></div>
      <div class="field"><label>Workspace ID</label><input id="workspaceId" placeholder="af4b2121-7d90-4638-a22d-957db40b862e"></div>
      <div class="field field-full"><label>Dataset ID</label><input id="datasetId" placeholder="fa5b22e3-0b68-4816-9137-12e8d8efdd76"></div>
      <div class="field field-full">
        <label>DAX-forespørgsel</label>
        <textarea id="daxQuery">EVALUATE
SUMMARIZECOLUMNS(
    'LagerPluk'[Tildelt Lagermedarbejder],
    KEEPFILTERS(FILTER(
        ALL('LagerPluk'[Posting_Date]),
        'LagerPluk'[Posting_Date] = TODAY()
    )),
    "AntalPluk", COUNTROWS('LagerPluk'),
    "AntalOrdrer", DISTINCTCOUNT('LagerPluk'[Document_No])
)</textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="saveAndLoad()">Gem og forbind</button>
      <button class="btn" onclick="loadFromGitHub()">Hent fra GitHub data.json</button>
      <button class="btn" onclick="loadDemo()">Demo-data</button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="metrics" id="metricsArea">
    <div class="metric">
      <div class="metric-label">Pluk i dag</div>
      <div class="metric-value accent" id="totalPluk">–</div>
      <div class="metric-sub" id="totalSub">–</div>
    </div>
    <div class="metric">
      <div class="metric-label">Ordrer i dag</div>
      <div class="metric-value" id="totalOrdrer">–</div>
      <div class="metric-sub">unikke forsendelser</div>
    </div>
    <div class="metric">
      <div class="metric-label">Aktive plukkere</div>
      <div class="metric-value" id="activePickers">–</div>
      <div class="metric-sub">medarbejdere</div>
    </div>
    <div class="metric">
      <div class="metric-label">Top plukker</div>
      <div class="metric-value" id="topName" style="font-size:20px;margin-top:6px;">–</div>
      <div class="metric-sub" id="topCount">–</div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">Rangliste — dagens pluk</div>
    <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;" id="lastUpdated"></div>
  </div>

  <div class="leaderboard" id="leaderboard"></div>

  <div class="footer">
    <div class="footer-text">AGK Nordic · Lager Dashboard · <span id="footerDate"></span></div>
    <div class="footer-text">Thomaslindby/Dashboard-Lager</div>
  </div>

</div>

<script>
const AVATAR_COLORS = [
  ['#0ea5e9','#082f49'],['#00d4a1','#022c22'],['#a78bfa','#2e1065'],
  ['#f59e0b','#451a03'],['#f472b6','#500724'],['#34d399','#022c22'],['#60a5fa','#082f49']
];

const DEMO = [
  {name:'LK@AGKNORDIC.DK', picks:109, orders:5},
  {name:'SP@AGKNORDIC.DK', picks:87, orders:4},
  {name:'MNA@AGKNORDIC.DK', picks:63, orders:3},
  {name:'RW@AGKNORDIC.DK', picks:41, orders:2},
  {name:'TL@AGKNORDIC.DK', picks:28, orders:2},
];

function getInitials(email) {
  return email.split('@')[0].slice(0,2).toUpperCase();
}
function formatName(email) {
  const local = email.split('@')[0];
  return local.split(/[.\-_]/).map(p=>p.charAt(0).toUpperCase()+p.slice(1).toLowerCase()).join(' ');
}

function renderDashboard(data) {
  const sorted = [...data].sort((a,b)=>b.picks-a.picks);
  const totalPluk = sorted.reduce((s,r)=>s+r.picks,0);
  const totalOrdrer = sorted.reduce((s,r)=>s+(r.orders||0),0);
  const max = sorted[0]?.picks||1;

  document.getElementById('totalPluk').textContent = totalPluk.toLocaleString('da-DK');
  document.getElementById('totalOrdrer').textContent = totalOrdrer.toLocaleString('da-DK');
  document.getElementById('activePickers').textContent = sorted.length;
  document.getElementById('totalSub').textContent = new Date().toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('topName').textContent = formatName(sorted[0]?.name||'–');
  document.getElementById('topCount').textContent = (sorted[0]?.picks||0)+' pluk · '+(sorted[0]?.orders||0)+' ordrer';
  document.getElementById('lastUpdated').textContent = 'Opdateret '+new Date().toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('footerDate').textContent = new Date().toLocaleDateString('da-DK');

  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';
  sorted.forEach((emp,i) => {
    const pct = Math.round((emp.picks/max)*100);
    const ac = AVATAR_COLORS[i%AVATAR_COLORS.length];
    const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const rowClass = i===0?'top1':i===1?'top2':i===2?'top3':'';
    const medals = ['01','02','03'];
    const row = document.createElement('div');
    row.className = 'lb-row '+rowClass;
    row.style.setProperty('--pct', pct+'%');
    row.style.animationDelay = (i*0.06)+'s';
    row.innerHTML = `
      <span class="rank-num ${rankClass}">${i<3?medals[i]:String(i+1).padStart(2,'0')}</span>
      <div class="avatar" style="background:${ac[1]};color:${ac[0]}">${getInitials(emp.name)}</div>
      <div class="info">
        <div class="emp-name">${formatName(emp.name)}</div>
        <div class="emp-email">${emp.name.toLowerCase()}</div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-val accent">${emp.picks.toLocaleString('da-DK')}</div>
          <div class="stat-label">pluk</div>
        </div>
        <div class="stat">
          <div class="stat-val">${(emp.orders||0).toLocaleString('da-DK')}</div>
          <div class="stat-label">ordrer</div>
        </div>
      </div>`;
    lb.appendChild(row);
  });

  setStatus('live');
}

function setStatus(state) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (state==='live') { dot.className='dot'; txt.textContent='Live'; }
  else if (state==='demo') { dot.className='dot idle'; txt.textContent='Demo'; }
  else if (state==='error') { dot.className='dot error'; txt.textContent='Fejl'; }
  else { dot.className='dot idle'; txt.textContent='Klar'; }
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '⚠ '+msg; el.style.display='block';
  setStatus('error');
}
function hideError() { document.getElementById('errorBox').style.display='none'; }

function loadDemo() {
  hideError();
  renderDashboard(DEMO);
  setStatus('demo');
  document.getElementById('dateLabel').textContent = 'Demo · '+new Date().toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});
}

async function loadFromGitHub() {
  hideError();
  try {
    const url = 'https://raw.githubusercontent.com/Thomaslindby/Dashboard-Lager/main/data.json?t='+Date.now();
    const r = await fetch(url);
    if (!r.ok) throw new Error('Kunne ikke hente data.json fra GitHub ('+r.status+')');
    const data = await r.json();
    renderDashboard(data);
    document.getElementById('dateLabel').textContent = 'GitHub data · '+new Date().toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});
  } catch(e) {
    showError(e.message);
  }
}

function getConfig() {
  return {
    tenantId: document.getElementById('tenantId').value.trim(),
    clientId: document.getElementById('clientId').value.trim(),
    clientSecret: document.getElementById('clientSecret').value.trim(),
    workspaceId: document.getElementById('workspaceId').value.trim(),
    datasetId: document.getElementById('datasetId').value.trim(),
    dax: document.getElementById('daxQuery').value.trim()
  };
}

async function getPBIToken(tenantId, clientId, secret) {
  const r = await fetch(`https://login.microsoftonline.com/${tenantId}/oauth2/v2.0/token`, {
    method:'POST',
    body: new URLSearchParams({grant_type:'client_credentials',client_id:clientId,client_secret:secret,scope:'https://analysis.windows.net/powerbi/api/.default'})
  });
  if (!r.ok) throw new Error('Token fejl '+r.status+' — tjek Tenant/Client ID og Secret');
  return (await r.json()).access_token;
}

async function queryDataset(token, workspaceId, datasetId, dax) {
  const r = await fetch(`https://api.powerbi.com/v1.0/myorg/groups/${workspaceId}/datasets/${datasetId}/executeQueries`, {
    method:'POST',
    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
    body: JSON.stringify({queries:[{query:dax}],serializerSettings:{includeNulls:false}})
  });
  if (!r.ok) throw new Error('Power BI API fejl '+r.status);
  return await r.json();
}

async function saveAndLoad() {
  hideError();
  const cfg = getConfig();
  if (!cfg.tenantId||!cfg.clientId||!cfg.clientSecret||!cfg.workspaceId||!cfg.datasetId) {
    showError('Udfyld alle felter.'); return;
  }
  try {
    const token = await getPBIToken(cfg.tenantId, cfg.clientId, cfg.clientSecret);
    const result = await queryDataset(token, cfg.workspaceId, cfg.datasetId, cfg.dax);
    const rows = result?.results?.[0]?.tables?.[0]?.rows||[];
    if (!rows.length) { showError('Ingen pluk fundet i dag. Prøv igen senere.'); return; }
    const keys = Object.keys(rows[0]);
    const nameCol = keys.find(k=>k.toLowerCase().includes('medarbej')||k.toLowerCase().includes('lager'))||keys[0];
    const plukCol = keys.find(k=>k.toLowerCase().includes('antal')||k.toLowerCase().includes('pluk')&&k!==nameCol)||keys[1];
    const ordreCol = keys.find(k=>k.toLowerCase().includes('ordre'))||null;
    const data = rows.map(r=>({name:r[nameCol], picks:Number(r[plukCol])||0, orders:ordreCol?Number(r[ordreCol])||0:0}));
    document.getElementById('dateLabel').textContent = 'Live · '+new Date().toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});
    renderDashboard(data);
    document.getElementById('configPanel').style.display='none';
  } catch(e) {
    showError(e.message+' (muligvis CORS — brug GitHub data.json i stedet)');
  }
}

function loadData() {
  loadFromGitHub();
}

function toggleConfig() {
  const p = document.getElementById('configPanel');
  p.style.display = p.style.display==='none'?'block':'none';
}

document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});
loadDemo();

// Auto-refresh every 5 min
setInterval(loadFromGitHub, 5*60*1000);
</script>
</body>
</html>
