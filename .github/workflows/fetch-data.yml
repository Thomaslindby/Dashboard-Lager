name: Hent lager pluk data

on:
  schedule:
    - cron: '*/15 5-15 * * 1-5'  # Hvert 15. min, hverdage 07-17 dansk tid
  workflow_dispatch:               # Manuel kørsel fra GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer requests
        run: pip install requests

      - name: Hent data fra Power BI
        env:
          PBI_TENANT_ID:     ${{ secrets.PBI_TENANT_ID }}
          PBI_CLIENT_ID:     ${{ secrets.PBI_CLIENT_ID }}
          PBI_CLIENT_SECRET: ${{ secrets.PBI_CLIENT_SECRET }}
          PBI_WORKSPACE_ID:  ${{ secrets.PBI_WORKSPACE_ID }}
          PBI_DATASET_ID:    ${{ secrets.PBI_DATASET_ID }}
        run: python fetch_data.py

      - name: Gem data.json til repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Opdater pluk data $(date -u '+%H:%M')"
          git push
